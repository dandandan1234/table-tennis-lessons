<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Tennis Skill Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 p-6 flex justify-center items-center min-h-screen">

    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">
        
        <h1 class="text-2xl font-bold mb-2 text-center text-gray-800">🏓 Skill Tracker</h1>
        <p class="text-gray-600 text-center mb-6">Select a skill for your next lesson:</p>
        
        <div id="skills-list" class="space-y-3">
            </div>

        <div id="status-message" class="mt-6 p-3 bg-green-50 border border-green-200 text-green-800 text-sm rounded-lg text-center hidden">
            Selection saved for your next lesson!
        </div>

    </div>

    <div id="video-modal" class="fixed inset-0 bg-black bg-opacity-70 flex justify-center items-center p-4 hidden z-50">
        <div class="bg-white rounded-xl p-6 w-full max-w-lg relative shadow-2xl">
            
            <button id="close-modal-btn" class="absolute top-3 right-3 text-gray-500 hover:text-gray-800 text-2xl font-bold">&times;</button>
            
            <h2 id="modal-video-title" class="text-xl font-bold mb-4 text-gray-800">Video Tutorial</h2>
            
            <div class="relative h-0 pb-[56.25%] overflow-hidden rounded-lg bg-black">
                <iframe id="youtube-player" referrerpolicy="strict-origin-when-cross-origin" class="absolute top-0 left-0 w-full h-full" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
            
            <p class="text-xs text-gray-500 mt-3 text-center">Watch this tutorial to prepare for your upcoming session!</p>
        </div>
    </div>

    <script>
        // List of skills with their custom YouTube video IDs
        const skillsData = [
            { name: "Forehand Drive", videoId: "pS84oQRyK-w" },
            { name: "Backhand Loop", videoId: "m-OnsrlRL7Y" },
            { name: "Pendulum Serve", videoId: "es8eTEAy6E0" }
        ];

        const skillsContainer = document.getElementById('skills-list');
        const statusMessage = document.getElementById('status-message');
        
        const videoModal = document.getElementById('video-modal');
        const modalVideoTitle = document.getElementById('modal-video-title');
        const youtubePlayer = document.getElementById('youtube-player');
        const closeModalBtn = document.getElementById('close-modal-btn');

        let savedSkill = localStorage.getItem('selectedSkill');

        function renderSkills() {
            skillsContainer.innerHTML = ''; 

            skillsData.forEach(skillObj => {
                const button = document.createElement('button');
                
                // Add a cute video label to the button
                button.innerHTML = `<span>${skillObj.name}</span> <span class="text-sm bg-blue-500 text-white px-2 py-1 rounded">🎬 Video</span>`;
                
                const baseStyles = "w-full flex justify-between items-center p-4 rounded-lg font-medium transition duration-200 border ";

                if (skillObj.name === savedSkill) {
                    button.className = baseStyles + "bg-green-100 border-2 border-green-500 font-bold text-green-900";
                } else {
                    button.className = baseStyles + "bg-gray-50 hover:bg-blue-100 border-gray-200 text-gray-700";
                }

                button.onclick = function() {
                    // Save skill selection to local storage
                    savedSkill = skillObj.name;
                    localStorage.setItem('selectedSkill', skillObj.name);
                    statusMessage.classList.remove('hidden');
                    renderSkills(); 

                    // Open the video popup
                    openVideoModal(skillObj.name, skillObj.videoId);
                };
                
                skillsContainer.appendChild(button);
            });
        }

        function openVideoModal(title, videoId) {
            modalVideoTitle.innerText = `${title} Tutorial`;
            
            // SECURITY FIX: Switched to youtube-nocookie.com domain to resolve local "Error 153"
            youtubePlayer.src = `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1`;
            
            videoModal.classList.remove('hidden'); 
        }

        function closeVideoModal() {
            videoModal.classList.add('hidden'); 
            youtubePlayer.src = ""; // Clears the player to stop video audio playing in background
        }

        // Close popup logic
        closeModalBtn.onclick = closeVideoModal;

        videoModal.onclick = function(event) {
            if (event.target === videoModal) {
                closeVideoModal();
            }
        };

        // Run the app setup
        renderSkills();

        if (savedSkill) {
            statusMessage.classList.remove('hidden');
        }
    </script>

</body>
</html>
